# ═══════════════════════════════════════════════════════════════
# Contribution Snake 🐍
# Guardar en: .github/workflows/snake.yml
# (dentro del repo armandofcom/armandofcom)
#
# Genera el SVG animado de la serpiente comiéndose tus
# contribuciones y lo publica en la rama "output".
# Tras el primer run, la imagen del README funcionará.
# ═══════════════════════════════════════════════════════════════

name: Generate contribution snake

on:
  schedule:
    - cron: "0 */12 * * *"   # cada 12 horas
  workflow_dispatch:          # permite ejecutarlo manualmente
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: armandofcom
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_dots=#161b22,#F4A100,#FF9900,#e07000,#c25e00

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.AF_GITHUB_TOKEN }}